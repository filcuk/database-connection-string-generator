<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Database Connection String Generator</title>
    <link rel="icon" href="app/res/icon.svg" type="image/svg+xml" />
    <script src="app/theme-init.js"></script>
    <link rel="stylesheet" href="app/styles.css" />
  </head>
  <body>
    <header>
      <div class="site-brand">
        <img class="site-logo" src="app/res/icon.svg" alt="" width="40" height="40" />
        <h1>Database Connection String Generator</h1>
      </div>
      <p class="tagline">Build connection strings for common databases.</p>
    </header>

    <main id="conn-app">
      <div class="banner banner-note conn-credit" role="note">
        <span class="banner-icon" data-icon="note" data-icon-class="banner-icon-svg" aria-hidden="true"></span>
        <span class="banner-body">
          Credit to
          <a href="https://www.connectionstrings.com/" target="_blank" rel="noopener noreferrer">ConnectionStrings.com</a>
          and its contributors for making this possible.
        </span>
      </div>

      <section class="content-section" aria-labelledby="config-heading">
        <h2 id="config-heading" class="section-heading">Configuration</h2>
        <div class="conn-toolbar">
          <div class="dropdown" id="db-dropdown">
            <button
              type="button"
              class="btn dropdown-trigger"
              id="db-dropdown-trigger"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="db-dropdown-menu"
            >
              <span id="db-dropdown-label">Microsoft SQL Server</span>
              <span data-icon="chevron-down" data-icon-class="dropdown-chevron" aria-hidden="true"></span>
            </button>
            <ul id="db-dropdown-menu" class="dropdown-menu hidden" role="menu"></ul>
          </div>
          <div id="driver-toggle" class="driver-toggle" role="group" aria-label="Connection format"></div>
        </div>
      </section>

      <section class="content-section" aria-labelledby="details-heading">
        <h2 id="details-heading" class="section-heading">Connection details</h2>
        <form id="conn-form" class="conn-form" autocomplete="off" novalidate>
        <div class="conn-form-grid">
          <label class="field" for="conn-host">
            <span class="field-label" id="conn-host-label">Server / host</span>
            <input type="text" id="conn-host" class="input" autocomplete="off" spellcheck="false" />
            <span class="field-hint hidden" id="conn-host-hint" hidden></span>
          </label>

          <label class="field" for="conn-port">
            <span class="field-label" id="conn-port-label">Port</span>
            <input type="number" id="conn-port" class="input" autocomplete="off" />
            <span class="field-hint hidden" id="conn-port-hint" hidden></span>
          </label>

          <label class="field" for="conn-database">
            <span class="field-label" id="conn-database-label">Database</span>
            <input type="text" id="conn-database" class="input" autocomplete="off" spellcheck="false" />
            <span class="field-hint hidden" id="conn-database-hint" hidden></span>
          </label>

          <label class="field" for="conn-username">
            <span class="field-label" id="conn-username-label">Username</span>
            <input type="text" id="conn-username" class="input" autocomplete="off" spellcheck="false" />
            <span class="field-hint hidden" id="conn-username-hint" hidden></span>
          </label>

          <label class="field conn-password-field" for="conn-password">
            <span class="field-label" id="conn-password-label">Password</span>
            <span class="conn-password-wrap">
              <input
                type="password"
                id="conn-password"
                class="input"
                autocomplete="off"
                spellcheck="false"
              />
              <button
                type="button"
                id="conn-password-toggle"
                class="btn btn-icon conn-password-toggle"
                aria-label="Show password"
                aria-pressed="false"
                data-icon="visibility"
                data-icon-class="btn-icon-svg"
              ></button>
            </span>
            <span class="field-hint hidden" id="conn-password-hint" hidden></span>
          </label>

          <label class="field conn-driver-field" for="conn-driver-preset">
            <span class="field-label" id="conn-driver-label">Driver / provider</span>
            <select id="conn-driver-preset" class="input conn-select" autocomplete="off"></select>
            <input
              type="text"
              id="conn-driver-custom"
              class="input hidden"
              hidden
              autocomplete="off"
              spellcheck="false"
              placeholder="Custom driver or provider name"
            />
            <span class="field-hint hidden" id="conn-driver-hint" hidden></span>
          </label>
        </div>

        <div class="expand conn-advanced" id="conn-advanced">
          <button
            type="button"
            class="expand-trigger"
            aria-expanded="false"
            aria-controls="conn-advanced-panel"
          >
            <span class="expand-notch" aria-hidden="true"></span>
            <span class="expand-label">Advanced options</span>
          </button>
          <div id="conn-advanced-panel" class="expand-panel hidden" hidden>
            <div class="expand-body conn-advanced-grid">
              <label class="field conn-opt-dsn" for="conn-use-dsn">
                <span class="field-label">Use DSN (ODBC)</span>
                <span class="conn-checkbox-wrap">
                  <input type="checkbox" id="conn-use-dsn" class="conn-checkbox" autocomplete="off" />
                  <span>Connect using a configured ODBC data source name</span>
                </span>
              </label>

              <label class="field conn-opt-dsn-name" for="conn-dsn">
                <span class="field-label">DSN name</span>
                <input type="text" id="conn-dsn" class="input" autocomplete="off" spellcheck="false" />
              </label>

              <label class="field conn-opt-timeout" for="conn-timeout">
                <span class="field-label">Connection timeout (seconds)</span>
                <input type="number" id="conn-timeout" class="input" min="0" autocomplete="off" placeholder="Optional" />
              </label>

              <label class="field conn-opt-mssql-auth" for="conn-auth-mode">
                <span class="field-label">Authentication</span>
                <select id="conn-auth-mode" class="input conn-select" autocomplete="off">
                  <option value="sql">SQL login</option>
                  <option value="windows">Windows integrated</option>
                </select>
              </label>

              <label class="field conn-opt-mssql-encrypt" for="conn-encrypt">
                <span class="field-label">Encrypt connection</span>
                <span class="conn-checkbox-wrap">
                  <input type="checkbox" id="conn-encrypt" class="conn-checkbox" autocomplete="off" />
                  <span>Use encrypted connection (recommended for Azure)</span>
                </span>
              </label>

              <label class="field conn-opt-oracle-mode" for="conn-oracle-mode">
                <span class="field-label">Oracle descriptor</span>
                <select id="conn-oracle-mode" class="input conn-select" autocomplete="off">
                  <option value="easyconnect">Easy Connect (host:port/service)</option>
                  <option value="tns">TNS (DESCRIPTION=…)</option>
                </select>
              </label>

              <label class="field conn-opt-oracle-os" for="conn-os-auth">
                <span class="field-label">OS authentication</span>
                <span class="conn-checkbox-wrap">
                  <input type="checkbox" id="conn-os-auth" class="conn-checkbox" autocomplete="off" />
                  <span>Use operating system authentication</span>
                </span>
              </label>

              <label class="field conn-opt-db2-mode" for="conn-db2-mode">
                <span class="field-label">DB2 connect mode</span>
                <select id="conn-db2-mode" class="input conn-select" autocomplete="off">
                  <option value="hostname">Hostname and database</option>
                  <option value="dbalias">Database alias (DBALIAS)</option>
                </select>
              </label>

              <label class="field conn-opt-db-alias" for="conn-db-alias">
                <span class="field-label">Database alias</span>
                <input type="text" id="conn-db-alias" class="input" autocomplete="off" spellcheck="false" />
              </label>

              <label class="field conn-opt-schema" for="conn-schema">
                <span class="field-label">Schema</span>
                <input type="text" id="conn-schema" class="input" autocomplete="off" spellcheck="false" placeholder="Optional (CurrentSchema / Default Schema)" />
              </label>

              <label class="field conn-opt-package" for="conn-package-collection">
                <span class="field-label">Package collection (DB2 OLE DB)</span>
                <input type="text" id="conn-package-collection" class="input" autocomplete="off" spellcheck="false" placeholder="Optional" />
              </label>

              <label class="field conn-opt-ssl" for="conn-ssl-mode">
                <span class="field-label">SSL</span>
                <select id="conn-ssl-mode" class="input conn-select" autocomplete="off">
                  <option value="off">Off</option>
                  <option value="preferred">Preferred</option>
                  <option value="required">Required</option>
                </select>
              </label>

              <label class="field conn-opt-charset" for="conn-charset">
                <span class="field-label">Character set (MySQL / MariaDB ODBC)</span>
                <input type="text" id="conn-charset" class="input" autocomplete="off" spellcheck="false" placeholder="e.g. utf8" />
              </label>

              <label class="field conn-opt-sqlite-memory" for="conn-sqlite-memory">
                <span class="field-label">In-memory database (SQLite)</span>
                <span class="conn-checkbox-wrap">
                  <input type="checkbox" id="conn-sqlite-memory" class="conn-checkbox" autocomplete="off" />
                  <span>Use <code>:memory:</code> instead of a file path</span>
                </span>
              </label>

              <label class="field conn-opt-sqlite-version" for="conn-sqlite-version">
                <span class="field-label">SQLite version</span>
                <select id="conn-sqlite-version" class="input conn-select" autocomplete="off">
                  <option value="3">3</option>
                  <option value="2">2</option>
                </select>
              </label>
            </div>
          </div>
        </div>
        </form>
      </section>

      <section class="content-section" aria-labelledby="output-heading">
        <h2 id="output-heading" class="section-heading">Connection string</h2>
        <div class="conn-output-wrap">
          <textarea
            id="conn-output"
            class="textarea conn-output"
            readonly
            rows="3"
            aria-label="Generated connection string"
            spellcheck="false"
          ></textarea>
          <button type="button" id="conn-copy" class="btn btn-primary conn-copy-btn">
            <span data-icon="copy" data-icon-class="btn-icon-svg" aria-hidden="true"></span>
            <span id="conn-copy-label">Copy</span>
          </button>
        </div>
        <div class="banner banner-info" role="note">
          <span class="banner-icon" data-icon="info" data-icon-class="banner-icon-svg" aria-hidden="true"></span>
          <span class="banner-body">Generated locally in your browser. Nothing is sent to a server.</span>
        </div>
      </section>
    </main>

    <script type="module" src="app/main.js"></script>
  </body>
</html>
